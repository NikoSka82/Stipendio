<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WebAppStipendio V7.6</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #f4f7f6;
            --primary: #2c3e50;
            --secondary: #34495e;
            --accent: #e74c3c;
            --success: #27ae60;
            --white: #ffffff;
            --shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); margin: 0; padding-bottom: 70px; color: var(--primary); }
        
        .header { background: var(--primary); color: var(--white); padding: 15px; text-align: center; font-size: 1.2rem; font-weight: bold; }

        .container { padding: 15px; max-width: 600px; margin: auto; }
        .card { background: var(--white); padding: 15px; border-radius: 12px; box-shadow: var(--shadow); margin-bottom: 15px; }

        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--white); display: flex; justify-content: space-around; padding: 10px; border-top: 2px solid #ddd; z-index: 1000; }
        .nav-item { border: none; background: none; font-size: 0.8rem; cursor: pointer; color: var(--secondary); display: flex; flex-direction: column; align-items: center; }
        .nav-item.active { color: var(--accent); font-weight: bold; }
        .nav-item i { font-size: 1.5rem; margin-bottom: 2px; }

        .input-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.9rem; margin-bottom: 5px; font-weight: 600; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; }
        
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 5px; }
        .btn-add { background: var(--success); color: var(--white); }
        .btn-del { background: var(--accent); color: var(--white); padding: 5px 10px; width: auto; font-size: 0.8rem; }

        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
        .list-item:last-child { border-bottom: none; }

        .summary-box { background: #fff3cd; padding: 15px; border-left: 5px solid #ffc107; border-radius: 8px; margin-bottom: 15px; }
        .res-real { background: #d4edda; border-left-color: #28a745; margin-top: 10px; }

        /* Accordion Style */
        .accordion { background: #eee; color: #444; cursor: pointer; padding: 12px; width: 100%; text-align: left; border: none; outline: none; transition: 0.4s; border-radius: 8px; margin-top: 10px; font-weight: bold; display: flex; justify-content: space-between; }
        .active-acc, .accordion:hover { background: #ddd; }
        .panel { padding: 0 10px; background-color: white; display: none; overflow: hidden; border: 1px solid #eee; border-radius: 0 0 8px 8px; }

        #chartCanvas { max-width: 100%; height: 250px; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="header" id="headerTitle">Dashboard</div>

    <div id="content" class="container"></div>

    <nav class="nav-bar">
        <button class="nav-item active" onclick="showTab('home')"><i>🏠</i>Home</button>
        <button class="nav-item" onclick="showTab('entrate')"><i>💰</i>Entrate</button>
        <button class="nav-item" onclick="showTab('spese')"><i>📉</i>Spese</button>
        <button class="nav-item" onclick="showTab('bilancio')"><i>📊</i>Bilancio</button>
        <button class="nav-item" onclick="showTab('setup')"><i>⚙️</i>Setup</button>
    </nav>

    <script>
        let db = JSON.parse(localStorage.getItem('stipendioDB')) || { s: [], v: [], f: [] };

        function save() { localStorage.setItem('stipendioDB', JSON.stringify(db)); }

        function showTab(tab) {
            const content = document.getElementById('content');
            const title = document.getElementById('headerTitle');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            event?.currentTarget?.classList.add('active');

            if (tab === 'home') {
                title.innerText = "Andamento Annuale";
                content.innerHTML = `<div class="card"><canvas id="chartCanvas"></canvas></div>`;
                renderChart();
            } 
            else if (tab === 'entrate') {
                title.innerText = "Inserisci Ore/Stipendio";
                content.innerHTML = `
                    <div class="card">
                        <div class="input-group"><label>Mese</label><select id="mS">${getMonths()}</select></div>
                        <div class="input-group"><label>Anno</label><input type="number" id="aS" value="${new Date().getFullYear()}"></div>
                        <div class="input-group"><label>Stipendio Netto (€)</label><input type="number" step="0.01" id="vS"></div>
                        <button class="btn btn-add" onclick="addStipendio()">Salva Stipendio</button>
                    </div>
                    <div id="listaS"></div>`;
                renderStipendi();
            }
            else if (tab === 'spese') {
                title.innerText = "Inserisci Spesa Extra";
                content.innerHTML = `
                    <div class="card">
                        <div class="input-group"><label>Nome Spesa</label><input type="text" id="nV"></div>
                        <div class="input-group"><label>Importo (€)</label><input type="number" step="0.01" id="vV"></div>
                        <div class="input-group"><label>Mese</label><select id="mV">${getMonths()}</select></div>
                        <div class="input-group"><label>Anno</label><input type="number" id="aV" value="${new Date().getFullYear()}"></div>
                        <button class="btn btn-add" onclick="addVariabile()">Aggiungi Spesa</button>
                    </div>
                    <button class="accordion" onclick="toggleAcc(this)">VEDI SPESE VARIABILI <span>▼</span></button>
                    <div class="panel" id="listaV"></div>`;
                renderVariabili();
            }
            else if (tab === 'bilancio') {
                title.innerText = "Bilancio Mensile";
                content.innerHTML = `
                    <div class="card">
                        <div class="input-group"><label>Seleziona Mese</label><select id="mB" onchange="renderBilancio()">${getMonths()}</select></div>
                        <div class="input-group"><label>Seleziona Anno</label><input type="number" id="aB" value="${new Date().getFullYear()}" onchange="renderBilancio()"></div>
                    </div>
                    <div id="resBilancio"></div>`;
                renderBilancio();
            }
            else if (tab === 'setup') {
                title.innerText = "Configurazione Spese Fisse";
                content.innerHTML = `
                    <div class="card">
                        <div class="input-group"><label>Nome Spesa Fissa</label><input type="text" id="nF"></div>
                        <div class="input-group"><label>Importo (€)</label><input type="number" step="0.01" id="vF"></div>
                        <div class="input-group"><label>Dal (Data Inizio)</label><input type="date" id="dfF"></div>
                        <div class="input-group"><label>Al (Data Fine)</label><input type="date" id="afF"></div>
                        <button class="btn btn-add" onclick="addFissa()">Aggiungi Fissa</button>
                    </div>
                    <button class="accordion" onclick="toggleAcc(this)">VEDI SPESE FISSE <span>▼</span></button>
                    <div class="panel" id="listaF"></div>
                    <div class="card" style="margin-top:20px;">
                        <label>Backup (Copia/Incolla)</label>
                        <textarea id="backData" style="width:100%; height:80px;"></textarea>
                        <button class="btn" onclick="exportData()">GENERA BACKUP</button>
                        <button class="btn" style="background:#34495e; color:white;" onclick="importData()">CARICA BACKUP</button>
                        <button class="btn btn-del" style="width:100%; margin-top:10px;" onclick="pulisciTutto()">CANCELLA TUTTO IL DATABASE</button>
                    </div>`;
                renderFisse();
            }
        }

        // Funzioni Core
        function getMonths() { 
            const m = ["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre","13° Mensilità"];
            return m.map(mo => `<option value="${mo}">${mo}</option>`).join('');
        }

        function toggleAcc(el) {
            el.classList.toggle("active-acc");
            let panel = el.nextElementSibling;
            panel.style.display = panel.style.display === "block" ? "none" : "block";
        }

        function addStipendio() {
            const s = { m: document.getElementById('mS').value, a: document.getElementById('aS').value, v: parseFloat(document.getElementById('vS').value), id: Date.now() };
            if(!s.v) return; db.s.push(s); save(); renderStipendi();
        }

        function addVariabile() {
            const v = { n: document.getElementById('nV').value, v: parseFloat(document.getElementById('vV').value), m: document.getElementById('mV').value, a: document.getElementById('aV').value, id: Date.now() };
            if(!v.v) return; db.v.push(v); save(); renderVariabili();
        }

        function addFissa() {
            const f = { n: document.getElementById('nF').value, v: parseFloat(document.getElementById('vF').value), da: document.getElementById('dfF').value, a: document.getElementById('afF').value, id: Date.now() };
            if(!f.v || !f.da || !f.a) return; db.f.push(f); save(); renderFisse();
        }

        function renderStipendi() {
            const lista = document.getElementById('listaS');
            lista.innerHTML = db.s.slice().reverse().map(x => `<div class="card list-item"><span>${x.m} ${x.a}: <b>€${x.v}</b></span><button class="btn-del" onclick="del('s',${x.id})">Elimina</button></div>`).join('');
        }

        function renderVariabili() {
            const lista = document.getElementById('listaV');
            lista.innerHTML = db.v.slice().reverse().map(x => `<div class="list-item"><span>${x.m} ${x.a} - ${x.n}: <b>€${x.v}</b></span><button class="btn-del" onclick="del('v',${x.id})">X</button></div>`).join('');
        }

        function renderFisse() {
            const lista = document.getElementById('listaF');
            lista.innerHTML = db.f.map(x => `<div class="list-item"><span>${x.n}: <b>€${x.v}</b></span><button class="btn-del" onclick="del('f',${x.id})">X</button></div>`).join('');
        }

        function del(type, id) { db[type] = db[type].filter(x => x.id !== id); save(); showTab(type === 's' ? 'entrate' : type === 'v' ? 'spese' : 'setup'); }

        function renderBilancio() {
            const m = document.getElementById('mB').value;
            const a = document.getElementById('aB').value;
            const res = document.getElementById('resBilancio');

            const stip = db.s.find(x => x.m === m && x.a == a)?.v || 0;
            const vari = db.v.filter(x => x.m === m && x.a == a).reduce((acc, x) => acc + x.v, 0);
            
            const dataRif = new Date(a, getMonthIndex(m), 15);
            const fisse = db.f.filter(x => {
                const da = new Date(x.da);
                const a = new Date(x.a);
                return dataRif >= da && dataRif <= a;
            }).reduce((acc, x) => acc + x.v, 0);

            const nettoDisp = stip - fisse;
            const finale = nettoDisp - vari;

            res.innerHTML = `
                <div class="summary-box">
                    <div>Stipendio: <b>€${stip.toFixed(2)}</b></div>
                    <div>Totale Spese Fisse: <b>-€${fisse.toFixed(2)}</b></div>
                    <hr>
                    <div style="font-size:1.1rem"><b>Netto Disponibile: €${nettoDisp.toFixed(2)}</b></div>
                </div>
                <div class="card">
                    <div>Totale Spese Variabili: <b>-€${vari.toFixed(2)}</b></div>
                </div>
                <div class="summary-box res-real">
                    <div style="font-size:1.2rem"><b>Residuo Reale: €${finale.toFixed(2)}</b></div>
                </div>`;
        }

        function getMonthIndex(m) {
            const mo = ["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"];
            return mo.indexOf(m);
        }

        function renderChart() {
            const ctx = document.getElementById('chartCanvas').getContext('2d');
            const mo = ["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"];
            const currentYear = new Date().getFullYear();
            
            const dataS = mo.map(m => db.s.find(x => x.m === m && x.a == currentYear)?.v || 0);
            const dataU = mo.map((m, idx) => {
                const v = db.v.filter(x => x.m === m && x.a == currentYear).reduce((a, b) => a + b.v, 0);
                const f = db.f.filter(x => {
                    const dataRif = new Date(currentYear, idx, 15);
                    return dataRif >= new Date(x.da) && dataRif <= new Date(x.a);
                }).reduce((a, b) => a + b.v, 0);
                return v + f;
            });

            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: mo.map(m => m.substring(0,3)),
                    datasets: [
                        { label: 'Entrate', data: dataS, borderColor: '#27ae60', tension: 0.3 },
                        { label: 'Uscite', data: dataU, borderColor: '#e74c3c', tension: 0.3 }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        function exportData() { document.getElementById('backData').value = JSON.stringify(db); }
        function importData() { 
            const raw = document.getElementById('backData').value;
            if(raw) { db = JSON.parse(raw); save(); alert("Dati caricati!"); showTab('home'); }
        }
        function pulisciTutto() {
            if(confirm("Sei sicuro? Cancellerai tutto il database!")) {
                db = { s: [], v: [], f: [] }; save(); alert("Database svuotato!"); showTab('setup');
            }
        }

        window.onload = () => showTab('home');
    </script>
</body>
</html>
