<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="data:application/json;base64,ewogICJkZWZhdWx0X2xvY2FsZSI6ICJpdCIsCiAgIm5hbWUiOiAiV2ViQXBwU3RpcGVuZGlvIiwKICAic2hvcnRfbmFtZSI6ICJTdGlwZW5kaW8iLAogICJzdGFydF91cmwiOiAiLiIsCiAgImRpc3BsYXkiOiAic3RhbmRhbG9uZSIsCiAgImJhY2tncm91bmRfY29sb3IiOiAiIzFhMWMyYyIsCiAgInRoZW1lX2NvbG9yIjogIiMxYTFjMmMiCn0=">
    
    <title>WebAppStipendio V6.0</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root { --bg: #1a1c2c; --card: #252a41; --accent: #3498db; --green: #2ecc71; --red: #e74c3c; --text: #ecf0f1; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding-bottom: 90px; }
        .page { display: none; padding: 15px; }
        .page.active { display: block; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 10px; border-left: 5px solid var(--accent); position: relative; }
        .navbar { position: fixed; bottom: 0; width: 100%; background: #161b33; display: flex; overflow-x: auto; height: 75px; border-top: 1px solid #34495e; z-index: 1000; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; }
        .navbar::-webkit-scrollbar { display: none; }
        .nav-item { flex: 0 0 33.33%; scroll-snap-align: start; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; cursor: pointer; color: #7f8c8d; text-transform: uppercase; border-right: 1px solid #252a41; }
        .nav-item.active { color: var(--accent); background: #1c223d; border-bottom: 4px solid var(--accent); }
        input, select { width: 100%; padding: 12px; margin: 5px 0; background: #161b33; border: 1px solid #34495e; color: white; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; color: white; }
        .btn-blue { background: var(--accent); } .btn-green { background: var(--green); } .btn-red { background: var(--red); }
        .header-click { display: flex; justify-content: space-between; align-items: center; background: #2c3e50; padding: 12px; border-radius: 8px; cursor: pointer; border-left: 5px solid var(--accent); margin-bottom: 20px; }
        .row-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #34495e; }
        .del-btn { background: var(--red); border: none; color: white; padding: 8px 14px; border-radius: 6px; font-size: 14px; }
        #netto-big { font-size: 35px; text-align: center; color: var(--green); font-weight: bold; margin: 10px 0; }
        .tot-mese { text-align: right; font-size: 18px; color: var(--red); font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="stipendi" class="page active">
    <h2 style="text-align:center;">💰 CALCOLO STIPENDIO</h2>
    <div class="card">
        <div style="display:flex; gap:5px;">
            <select id="m">
                <option>Gennaio</option><option selected>Febbraio</option><option>Marzo</option><option>Aprile</option><option>Maggio</option><option>Giugno</option>
                <option>Luglio</option><option>Agosto</option><option>Settembre</option><option>Ottobre</option><option>Novembre</option><option>Dicembre</option>
                <option>13° Mensilità</option>
            </select>
            <select id="a"><option>2026</option><option>2027</option><option>2028</option></select>
        </div>
        <input type="number" id="o" placeholder="Ore Totali" oninput="cal()">
        <input type="number" id="t" placeholder="Ore Trasferta (20€)" oninput="cal()">
        <input type="number" id="k" value="102.30" oninput="cal()">
        <div id="netto-big">€ 0,00</div>
        <button class="btn btn-green" onclick="saveS()">💾 SALVA IN ENTRATE</button>
    </div>
</div>

<div id="spese" class="page">
    <h2 style="text-align:center;">💸 USCITE MENSILI</h2>
    <div class="card">
        <div style="display:flex; gap:5px;">
            <select id="sv-m" onchange="renderV()">
                <option>Gennaio</option><option>Febbraio</option><option>Marzo</option><option>Aprile</option><option>Maggio</option><option>Giugno</option>
                <option>Luglio</option><option>Agosto</option><option>Settembre</option><option>Ottobre</option><option>Novembre</option><option>Dicembre</option>
            </select>
            <select id="sv-a" onchange="renderV()"><option>2026</option><option>2027</option><option>2028</option></select>
        </div>
        <input type="text" id="sn" placeholder="Causale (es. Spesa)">
        <input type="number" id="sv" placeholder="Importo €">
        <button class="btn btn-red" onclick="addV()">➕ AGGIUNGI SPESA</button>
    </div>
    <div id="tot-uscita" class="tot-mese"></div>
    <div id="list-v" style="margin-top:10px;"></div>
</div>

<div id="archivio" class="page">
    <h2 style="text-align:center;">📂 ENTRATE</h2>
    <button class="btn btn-blue" onclick="downloadPDF()" style="margin-bottom:15px;">📄 SALVA PDF ARCHIVIO</button>
    <div id="list-s"></div>
</div>

<div id="bilancio" class="page">
    <h2 style="text-align:center;">⚖️ BILANCIO ANNUALE</h2>
    <select id="b-a" onchange="renderB()"><option>2026</option><option>2027</option><option>2028</option></select>
    <div id="b-res"></div>
    <div class="card" style="height: 280px;"><canvas id="pieChart"></canvas></div>
</div>

<div id="andamento" class="page">
    <h2 style="text-align:center;">📈 ANDAMENTO</h2>
    <select id="chart-a" onchange="initChart()"><option>2026</option><option>2027</option><option>2028</option></select>
    <div class="card" style="height: 350px;"><canvas id="myChart"></canvas></div>
</div>

<div id="setup" class="page">
    <h2 style="text-align:center;">⚙️ SETUP</h2>
    <div class="card">
        <h3>🏠 Spese Fisse</h3>
        <input type="text" id="f-n" placeholder="Nome">
        <input type="number" id="f-v" placeholder="€">
        <div style="display:flex; gap:5px;"><input type="date" id="f-da"><input type="date" id="f-a"></div>
        <button class="btn btn-blue" onclick="addF()">💾 SALVA FISSA</button>
    </div>
    <div class="card" style="border-left-color: var(--red);">
        <button class="btn btn-red" onclick="hardReset()">⚠️ RESET TOTALE DATABASE</button>
    </div>
</div>

<nav class="navbar">
    <div class="nav-item active" onclick="nav('stipendi',this)">Stipendi</div>
    <div class="nav-item" onclick="nav('spese',this)">Spese</div>
    <div class="nav-item" onclick="nav('archivio',this)">Entrate</div>
    <div class="nav-item" onclick="nav('bilancio',this)">Bilancio</div>
    <div class="nav-item" onclick="nav('andamento',this)">Andamento</div>
    <div class="nav-item" onclick="nav('setup',this)">Setup</div>
</nav>

<script>
    Chart.register(ChartDataLabels);
    let db = JSON.parse(localStorage.getItem('stip_db_v4')) || {s:[], v:[], f:[]};
    const mesiArr = ["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre","13° Mensilità"];

    function nav(id, el) {
        document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(i=>i.classList.remove('active'));
        el.classList.add('active');
        if(id==='archivio') renderS(); if(id==='spese') renderV(); if(id==='bilancio') renderB(); if(id==='andamento') initChart();
    }

    function up() { localStorage.setItem('stip_db_v4', JSON.stringify(db)); }
    function hardReset() { if(confirm("Cancellare TUTTO?")) { localStorage.removeItem('stip_db_v4'); location.reload(); } }

    function cal() {
        const o=parseFloat(document.getElementById('o').value)||0, t=parseFloat(document.getElementById('t').value)||0, k=parseFloat(document.getElementById('k').value)||0;
        const res = ((o*14.94272)*0.7030)+(t*20)+k+244.83-21.40;
        document.getElementById('netto-big').innerText="€ "+res.toLocaleString('it-IT',{minimumFractionDigits:2});
        return res;
    }

    function saveS() { db.s.push({m:document.getElementById('m').value, a:document.getElementById('a').value, v:cal(), id:Date.now()}); up(); alert("Salvato!"); }

    function renderS() {
        const container = document.getElementById('list-s');
        const years = [...new Set(db.s.map(x => x.a))].sort().reverse();
        container.innerHTML = years.map(y => {
            const totY = db.s.filter(x => x.a === y).reduce((a,b)=>a+b.v,0);
            return `<div id="pdf-area-${y}"><div class="header-click"><span><b>${y} - TOT: € ${totY.toLocaleString()}</b></span></div><div>${db.s.filter(x => x.a === y).map(x => `<div class="card row-item"><span>${x.m}: <b>€${x.v.toFixed(2)}</b></span><button class="del-btn" onclick="delItem('s', ${x.id})">🗑️</button></div>`).join('')}</div></div>`;
        }).join('');
    }

    function downloadPDF() {
        const element = document.getElementById('list-s');
        const opt = { margin: 10, filename: 'Archivio_Stipendi.pdf', image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2, backgroundColor: '#1a1c2c' }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };
        html2pdf().set(opt).from(element).save();
    }

    function addV() { const v=parseFloat(document.getElementById('sv').value)||0, n=document.getElementById('sn').value, m=document.getElementById('sv-m').value, a=document.getElementById('sv-a').value; if(v>0) { db.v.push({v, n, m, a, id:Date.now()}); up(); renderV(); } }
    
    function renderV() {
        const yr = parseInt(document.getElementById('sv-a').value), selMese = document.getElementById('sv-m').value;
        let total = 0;
        let htmlV = db.v.filter(x=>x.a==yr && x.m==selMese).map(x=>{ total += x.v; return `<div class="card row-item"><span>${x.n}: <b>€${x.v.toFixed(2)}</b></span><button class="del-btn" onclick="delItem('v', ${x.id})">🗑️</button></div>`; }).join('');
        document.getElementById('list-v').innerHTML = htmlV;
        document.getElementById('tot-uscita').innerText = "Totale Mese: € " + total.toFixed(2);
    }

    function renderB() {
        const yr = document.getElementById('b-a').value; 
        const ent = db.s.filter(x=>x.a===yr).reduce((a,b)=>a+b.v,0);
        let uscV = db.v.filter(x=>x.a===yr).reduce((a,b)=>a+b.v,0);
        document.getElementById('b-res').innerHTML = `<div class="card">Entrate: €${ent.toLocaleString()}<br>Uscite Var.: €${uscV.toLocaleString()}<hr>RISPARMIO: €${(ent-uscV).toLocaleString()}</div>`;
    }

    function initChart() {
        const ctx = document.getElementById('myChart').getContext('2d'); const yr = document.getElementById('chart-a').value;
        if(window.chartObj) window.chartObj.destroy();
        const dEnt = mesiArr.slice(0,12).map(m => { const e = db.s.find(x => x.m === m && x.a === yr); return e ? e.v : 0; });
        window.chartObj = new Chart(ctx, { type: 'line', data: { labels: mesiArr.slice(0,12), datasets: [{ label: 'Entrate €', data: dEnt, borderColor: '#2ecc71' }] }, options: { maintainAspectRatio: false } });
    }

    function addF() { const n=document.getElementById('f-n').value, v=parseFloat(document.getElementById('f-v').value)||0, da=document.getElementById('f-da').value, a=document.getElementById('f-a').value; if(n && v>0) { db.f.push({n, v, da, a, id:Date.now()}); up(); alert("Salvata!"); } }
    function delItem(type, id) { if(confirm("Eliminare?")) { db[type] = db[type].filter(x=>x.id!==id); up(); renderS(); renderV(); }}
</script>
</body>
</html>
