<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stipendio PRO</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style>
        :root { --bg: #1a1c2c; --card: #252a41; --accent: #3498db; --green: #2ecc71; --red: #e74c3c; --text: #ecf0f1; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding-bottom: 80px; }
        .page { display: none; padding: 15px; }
        .page.active { display: block; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 15px; border-left: 5px solid var(--accent); position: relative; }
        .navbar { position: fixed; bottom: 0; width: 100%; background: #161b33; display: flex; height: 70px; border-top: 1px solid #34495e; z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 9px; cursor: pointer; color: #7f8c8d; }
        .nav-item.active { color: var(--accent); font-weight: bold; }
        input, select, textarea { width: 100%; padding: 12px; margin: 5px 0; background: #161b33; border: 1px solid #34495e; color: white; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; color: white; }
        .btn-blue { background: var(--accent); } .btn-green { background: var(--green); } .btn-red { background: var(--red); }
        .delete-btn { background: var(--red); color: white; border: none; border-radius: 5px; padding: 4px 8px; cursor: pointer; float: right; }
        #netto-big { font-size: 38px; text-align: center; color: var(--green); font-weight: bold; margin: 15px 0; }
        .fissa-item { font-size: 14px; padding: 5px 0; border-bottom: 1px solid #34495e; }
    </style>
</head>
<body>

<div id="stipendi" class="page active">
    <h2 style="text-align:center;">💰 STIPENDIO IVECO</h2>
    <div class="card">
        <div style="display:flex; gap:5px;">
            <select id="m"><option>Gennaio</option><option selected>Febbraio</option><option>Marzo</option><option>Aprile</option><option>Maggio</option><option>Giugno</option><option>Luglio</option><option>Agosto</option><option>Settembre</option><option>Ottobre</option><option>Novembre</option><option>Dicembre</option></select>
            <select id="a"><option selected>2026</option></select>
        </div>
        <input type="number" id="o" placeholder="Ore Totali" oninput="cal()">
        <input type="number" id="t" placeholder="Ore Trasferta (20€)" oninput="cal()">
        <input type="number" id="k" value="102.30" oninput="cal()">
        <div id="extra-area"></div>
        <button class="btn" style="background:transparent; border:1px dashed var(--accent); color:var(--accent);" onclick="addEx()">+ EXTRA / NOTE</button>
        <div id="netto-big">€ 0,00</div>
        <button class="btn btn-green" onclick="saveS()">💾 SALVA IN ARCHIVIO</button>
        <button class="btn btn-red" style="opacity:0.7" onclick="pulisci()">🧹 PULISCI TUTTO</button>
    </div>
</div>

<div id="spese" class="page">
    <h2 style="text-align:center;">💸 USCITE VARIABILI</h2>
    <div class="card">
        <input type="number" id="sv" placeholder="Importo €">
        <input type="text" id="sn" placeholder="Causale">
        <button class="btn btn-red" onclick="addV()">➕ AGGIUNGI SPESA</button>
    </div>
    <div id="list-v"></div>
</div>

<div id="archivio" class="page">
    <h2 style="text-align:center;">📂 STORICO</h2>
    <div id="list-s"></div>
</div>

<div id="bilancio" class="page">
    <h2 style="text-align:center;">⚖️ BILANCIO REALE</h2>
    <div id="b-res"></div>
</div>

<div id="stats" class="page">
    <h2 style="text-align:center;">📈 ANDAMENTO</h2>
    <div class="card"><canvas id="myChart"></canvas></div>
</div>

<div id="setup" class="page">
    <h2 style="text-align:center;">⚙️ SETUP</h2>
    <div class="card">
        <h3>🏠 Spese Fisse (Importo|Nome|Inizio|Fine)</h3>
        <textarea id="fisse" style="height:120px;" placeholder="550|Affitto|Gennaio|Dicembre"></textarea>
        <button class="btn btn-blue" onclick="saveF()">💾 SALVA FISSI</button>
    </div>
    <div class="card">
        <h3>🔄 Backup</h3>
        <textarea id="back" style="height:60px; font-size:10px;"></textarea>
        <div style="display:flex; gap:5px;">
            <button class="btn btn-green" onclick="exportD()">COPIA</button>
            <button class="btn btn-red" onclick="importD()">CARICA</button>
        </div>
    </div>
</div>

<nav class="navbar">
    <div class="nav-item active" onclick="nav('stipendi',this)">💰 STIPENDI</div>
    <div class="nav-item" onclick="nav('spese',this)">💸 SPESE</div>
    <div class="nav-item" onclick="nav('archivio',this)">📂 STORICO</div>
    <div class="nav-item" onclick="nav('bilancio',this)">⚖️ BILANCIO</div>
    <div class="nav-item" onclick="nav('stats',this)">📈 STATS</div>
    <div class="nav-item" onclick="nav('setup',this)">⚙️ SETUP</div>
</nav>

<script>
    Chart.register(ChartDataLabels);
    let db = JSON.parse(localStorage.getItem('stip_db_v3')) || {s:[], v:[], f:""};
    let myChart = null;

    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

    function nav(id, el) {
        document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(i=>i.classList.remove('active'));
        el.classList.add('active');
        if(id==='archivio') renderS(); 
        if(id==='spese') renderV(); 
        if(id==='bilancio') renderB();
        if(id==='stats') initChart(); 
        if(id==='setup') document.getElementById('fisse').value = db.f;
    }

    function addEx() {
        const d = document.createElement('div'); d.className='extra-row';
        d.innerHTML = `<input type="number" class="ex-v" placeholder="€" oninput="cal()"><input type="text" class="ex-n" placeholder="Nota"><button onclick="this.parentElement.remove();cal();" style="background:var(--red); color:white; border:none; border-radius:5px; width:35px;">X</button>`;
        document.getElementById('extra-area').appendChild(d);
    }

    function cal() {
        const o=parseFloat(document.getElementById('o').value)||0, t=parseFloat(document.getElementById('t').value)||0, k=parseFloat(document.getElementById('k').value)||0;
        let e=0; document.querySelectorAll('.ex-v').forEach(i=>e+=parseFloat(i.value)||0);
        const res = ((o*14.94272)*0.7030)+(t*20)+k+244.83-21.40+e;
        document.getElementById('netto-big').innerText="€ "+res.toLocaleString('it-IT',{minimumFractionDigits:2});
        return res;
    }

    function saveS() { db.s.push({m:document.getElementById('m').value, a:document.getElementById('a').value, v:cal(), id:Date.now()}); up(); alert("Salvato!"); }
    function addV() { 
        const v=parseFloat(document.getElementById('sv').value)||0, n=document.getElementById('sn').value||"Spesa";
        if(v>0){ db.v.push({v,n,m:document.getElementById('m').value,id:Date.now()}); up(); renderV(); }
    }
    function delV(id) { db.v = db.v.filter(x=>x.id!==id); up(); renderV(); }
    function delS(id) { if(confirm("Eliminare?")){ db.s = db.s.filter(x=>x.id!==id); up(); renderS(); }}
    function saveF() { db.f = document.getElementById('fisse').value; up(); alert("Fissi salvati!"); }
    function up() { localStorage.setItem('stip_db_v3', JSON.stringify(db)); }

    function renderV() {
        document.getElementById('list-v').innerHTML = db.v.map(x=>`<div class="card"><b>${x.n}</b>: €${x.v.toFixed(2)} <button class="delete-btn" onclick="delV(${x.id})">🗑️</button></div>`).join('');
    }

    function renderS() {
        document.getElementById('list-s').innerHTML = db.s.map(x=>`<div class="card"><b>${x.m} ${x.a}</b>: €${x.v.toFixed(2)} <button class="delete-btn" onclick="delS(${x.id})">🗑️</button></div>`).join('');
    }

    function renderB() {
        const ent = db.s.reduce((a,b)=>a+b.v,0);
        const uscV = db.v.reduce((a,b)=>a+b.v,0);
        let uscF = 0; 
        let listaFisse = "";
        db.f.split('\n').forEach(l=>{ 
            if(l.includes('|')) {
                const p = l.split('|');
                const val = parseFloat(p[0])||0;
                uscF += val;
                listaFisse += `<div class="fissa-item">📌 ${p[1]}: <b>€${val.toFixed(2)}</b> <br><small>${p[2]||''} - ${p[3]||''}</small></div>`;
            }
        });
        document.getElementById('b-res').innerHTML = `
            <div class="card"><h3>Dettaglio Spese Fisse</h3>${listaFisse || "Nessuna spesa fissa"}</div>
            <div class="card" style="font-size:18px; border-left-color:var(--green);">
                Entrate: €${ent.toLocaleString('it-IT')}<br>
                Uscite Totali: €${(uscV+uscF).toLocaleString('it-IT')}<hr>
                <b>RESIDUO: €${(ent-uscV-uscF).toLocaleString('it-IT')}</b>
            </div>`;
    }

    function initChart() {
        const ctx = document.getElementById('myChart').getContext('2d');
        if(myChart) myChart.destroy();
        
        let uscF = 0; db.f.split('\n').forEach(l=>{ if(l.includes('|')) uscF += parseFloat(l.split('|')[0])||0; });
        const labels = db.s.map(x=>x.m);
        const dataStip = db.s.map(x=>x.v);
        const dataSpese = db.s.map(s => {
            const v = db.v.filter(x=>x.m === s.m).reduce((a,b)=>a+b.v, 0);
            return v + uscF;
        });

        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    { label: 'Stipendio €', data: dataStip, borderColor: '#2ecc71', backgroundColor: '#2ecc71', tension: 0.3 },
                    { label: 'Spese Tot €', data: dataSpese, borderColor: '#e74c3c', backgroundColor: '#e74c3c', tension: 0.3 }
                ]
            },
            options: {
                plugins: {
                    datalabels: { color: '#fff', align: 'top', font: { size: 10, weight: 'bold' }, formatter: (v) => '€'+Math.round(v) }
                },
                scales: { y: { ticks: { color: '#7f8c8d' }, grid: { color: '#34495e' } } }
            }
        });
    }

    function pulisci() { document.getElementById('o').value=''; document.getElementById('t').value=''; document.getElementById('extra-area').innerHTML=''; cal(); }
    function exportD() { document.getElementById('back').value = btoa(JSON.stringify(db)); alert("Copiato!"); }
    function importD() { try { db = JSON.parse(atob(document.getElementById('back').value)); up(); location.reload(); } catch(e){alert("Errore!");} }
</script>
</body>
</html>
