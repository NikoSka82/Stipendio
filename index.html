<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1a1c2c">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" sizes="192x192" href="https://cdn-icons-png.flaticon.com/512/2489/2489796.png">
    <title>Stipendio V7.2</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --bg: #1a1c2c; --card: #252a41; --accent: #3498db; --green: #2ecc71; --red: #e74c3c; --text: #ecf0f1; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding-bottom: 90px; overflow-x: hidden; }
        .page { display: none; padding: 15px; }
        .page.active { display: block; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 10px; border-left: 5px solid var(--accent); position: relative; }
        .navbar { position: fixed; bottom: 0; left: 0; width: 100%; background: #161b33; display: flex; height: 75px; border-top: 1px solid #34495e; z-index: 1000; overflow-x: auto; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
        .navbar::-webkit-scrollbar { display: none !important; }
        .nav-item { flex: 0 0 33.33%; scroll-snap-align: start; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: bold; cursor: pointer; color: #7f8c8d; text-transform: uppercase; border-right: 1px solid #252a41; box-sizing: border-box; }
        .nav-item.active { color: var(--accent); background: #1c223d; border-bottom: 4px solid var(--accent); }
        input, select { width: 100%; padding: 12px; margin: 5px 0; background: #161b33; border: 1px solid #34495e; color: white; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; color: white; }
        .btn-blue { background: var(--accent); } .btn-green { background: var(--green); } .btn-red { background: var(--red); }
        .header-click { display: flex; justify-content: space-between; align-items: center; background: #2c3e50; padding: 12px; border-radius: 8px; cursor: pointer; border-left: 5px solid var(--accent); margin-bottom: 10px; }
        .row-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #34495e; }
        .del-btn { background: var(--red); border: none; color: white; padding: 8px 14px; border-radius: 6px; font-size: 14px; }
        #netto-big { font-size: 35px; text-align: center; color: var(--green); font-weight: bold; margin: 10px 0; }
        .tot-mese { text-align: right; font-size: 18px; color: var(--red); font-weight: bold; margin-bottom: 10px; }
        .label-fissa { font-size: 11px; color: #bdc3c7; display: block; }
    </style>
</head>
<body>

<div id="stipendi" class="page active">
    <h2 style="text-align:center;">💰 CALCOLO STIPENDIO</h2>
    <div class="card">
        <div style="display:flex; gap:5px;"><select id="m"><option>Gennaio</option><option selected>Febbraio</option><option>Marzo</option><option>Aprile</option><option>Maggio</option><option>Giugno</option><option>Luglio</option><option>Agosto</option><option>Settembre</option><option>Ottobre</option><option>Novembre</option><option>Dicembre</option><option>13° Mensilità</option></select><select id="a"><option>2026</option><option>2027</option><option>2028</option></select></div>
        <input type="number" id="o" placeholder="Ore Totali" oninput="cal()"><input type="number" id="t" placeholder="Ore Trasferta (20€)" oninput="cal()"><input type="number" id="k" value="102.30" oninput="cal()">
        <div id="netto-big">€ 0,00</div><button class="btn btn-green" onclick="saveS()">💾 SALVA IN ENTRATE</button>
    </div>
</div>

<div id="spese" class="page">
    <h2 style="text-align:center;">💸 USCITE MENSILI</h2>
    <div class="card">
        <div style="display:flex; gap:5px;"><select id="sv-m" onchange="renderV()"><option>Gennaio</option><option>Febbraio</option><option>Marzo</option><option>Aprile</option><option>Maggio</option><option>Giugno</option><option>Luglio</option><option>Agosto</option><option>Settembre</option><option>Ottobre</option><option>Novembre</option><option>Dicembre</option></select><select id="sv-a" onchange="renderV()"><option>2026</option><option>2027</option><option>2028</option></select></div>
        <input type="text" id="sn" placeholder="Causale"><input type="number" id="sv" placeholder="Importo €"><button class="btn btn-red" onclick="addV()">➕ AGGIUNGI SPESA</button>
    </div>
    <div id="tot-uscita" class="tot-mese"></div>
    <div id="fixed-header" class="header-click" onclick="toggleFixed()" style="display:none; margin-bottom:0;"><span>📌 SPESE FISSE</span><span>▼</span></div>
    <div id="list-f" style="display:none; background: rgba(52, 152, 219, 0.08); padding: 10px; border-radius: 0 0 8px 8px; border: 1px solid #34495e;"></div>
    <div id="list-v" style="margin-top:10px;"></div>
</div>

<div id="archivio" class="page">
    <h2 style="text-align:center;">📂 ENTRATE</h2>
    <button class="btn btn-blue" onclick="downloadPDF()" style="margin-bottom:15px;">📄 PDF PROFESSIONALE</button>
    <div id="list-s"></div>
</div>

<div id="bilancio" class="page">
    <h2 style="text-align:center;">⚖️ BILANCIO</h2>
    <div style="display:flex; gap:5px;">
        <select id="b-m" onchange="renderB()"><option>Gennaio</option><option>Febbraio</option><option>Marzo</option><option>Aprile</option><option>Maggio</option><option>Giugno</option><option>Luglio</option><option>Agosto</option><option>Settembre</option><option>Ottobre</option><option>Novembre</option><option>Dicembre</option></select>
        <select id="b-a" onchange="renderB()"><option>2026</option><option>2027</option><option>2028</option></select>
    </div>
    <div id="b-res"></div>
    <button class="btn btn-blue" id="btn-toggle-anno" onclick="toggleBilancioAnno()">📊 MOSTRA TOTALE ANNUALE</button>
    <div id="b-anno-area" style="display:none; margin-top:15px;">
        <div id="b-res-anno"></div>
        <div class="card" style="height: 280px;"><canvas id="pieChart"></canvas></div>
    </div>
</div>

<div id="andamento" class="page">
    <h2 style="text-align:center;">📈 ANDAMENTO</h2>
    <select id="chart-a" onchange="initChart()"><option>2026</option><option>2027</option><option>2028</option></select>
    <div class="card" style="height: 350px;"><canvas id="myChart"></canvas></div>
</div>

<div id="setup" class="page">
    <h2 style="text-align:center;">⚙️ SETUP</h2>
    <div class="card"><h3>🏠 Aggiungi Spesa Fissa</h3><input type="text" id="f-n" placeholder="Nome"><input type="number" id="f-v" placeholder="€/mese"><div style="display:flex; gap:5px;"><input type="date" id="f-da"><input type="date" id="f-a"></div><button class="btn btn-blue" onclick="addF()">💾 SALVA FISSA</button></div>
    <div class="card"><h3>🔄 Backup / Ripristino</h3><textarea id="back" placeholder="Codice backup..." style="height:80px; font-size:10px; width:100%; background:#161b33; color:white; border-radius:8px; padding:5px; box-sizing:border-box; border:1px solid #34495e;"></textarea><div style="display:flex; gap:5px;"><button class="btn btn-blue" style="flex:1" onclick="exportD()">📄 GENERA</button><button class="btn btn-green" style="flex:1" onclick="importD()">📥 CARICA</button></div></div>
    <div class="card" style="border-left-color: var(--red);"><h3>⚠️ Pericolo</h3><button class="btn btn-red" onclick="hardReset()">⚠️ CANCELLA TUTTO IL DATABASE</button></div>
</div>

<nav class="navbar">
    <div class="nav-item active" onclick="nav('stipendi',this)">Stipendi</div>
    <div class="nav-item" onclick="nav('spese',this)">Spese</div>
    <div class="nav-item" onclick="nav('archivio',this)">Entrate</div>
    <div class="nav-item" onclick="nav('bilancio',this)">Bilancio</div>
    <div class="nav-item" onclick="nav('andamento',this)">Andamento</div>
    <div class="nav-item" onclick="nav('setup',this)">Setup</div>
</nav>

<script>
    Chart.register(ChartDataLabels);
    let db = JSON.parse(localStorage.getItem('stip_db_v4')) || {s:[], v:[], f:[]};
    const mesiArr = ["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre","13° Mensilità"];

    function nav(id, el) {
        document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(i=>i.classList.remove('active'));
        el.classList.add('active');
        if(id==='archivio') renderS(); if(id==='spese') renderV(); if(id==='bilancio') renderB(); if(id==='andamento') initChart();
    }
    function up() { localStorage.setItem('stip_db_v4', JSON.stringify(db)); }
    function hardReset() { if(confirm("Cancellare tutto il database?")) { localStorage.removeItem('stip_db_v4'); location.reload(); } }
    
    function cal() { const o=parseFloat(document.getElementById('o').value)||0, t=parseFloat(document.getElementById('t').value)||0, k=parseFloat(document.getElementById('k').value)||0; const res = ((o*14.94272)*0.7030)+(t*20)+k+244.83-21.40; document.getElementById('netto-big').innerText="€ "+res.toLocaleString('it-IT',{minimumFractionDigits:2}); return res; }
    function saveS() { db.s.push({m:document.getElementById('m').value, a:document.getElementById('a').value, v:cal(), id:Date.now()}); up(); alert("Salvato!"); }
    
    function renderS() { 
        const c = document.getElementById('list-s'); 
        const yrs = [...new Set(db.s.map(x => x.a))].sort().reverse(); 
        c.innerHTML = yrs.map(y => `<div class="header-click" onclick="toggleArch('${y}')"><span><b>${y} - TOT: € ${db.s.filter(x=>x.a===y).reduce((a,b)=>a+b.v,0).toLocaleString()}</b></span><div><button class="del-btn" onclick="event.stopPropagation(); delY('${y}')">🗑️</button> <span>▼</span></div></div><div id="arch-${y}" style="display:none;">${db.s.filter(x=>x.a===y).map(x=>`<div class="card row-item"><span>${x.m}: <b>€${x.v.toFixed(2)}</b></span><button class="del-btn" onclick="delItem('s', ${x.id})">🗑️</button></div>`).join('')}</div>`).join(''); 
    }
    function delY(y) { if(confirm("Eliminare intero anno "+y+"?")) { db.s = db.s.filter(x=>x.a!==y); up(); renderS(); }}
    function toggleArch(y) { const e = document.getElementById('arch-'+y); e.style.display = e.style.display==='none'?'block':'none'; }

    function downloadPDF() {
        const yrs = [...new Set(db.s.map(x => x.a))].sort().reverse();
        if(yrs.length === 0) { alert("Nessun dato!"); return; }
        let htmlContent = `<div style="padding: 20px; font-family: Arial; color: #000; background: #fff;"><h1 style="text-align: center; color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px;">RECONTO ENTRATE</h1>`;
        yrs.forEach(y => {
            const entAnno = db.s.filter(x => x.a === y);
            const totAnno = entAnno.reduce((a, b) => a + b.v, 0);
            htmlContent += `<h2 style="margin-top: 20px; background: #eee; padding: 10px;">Anno: ${y} (Tot: € ${totAnno.toLocaleString('it-IT')})</h2><table style="width: 100%; border-collapse: collapse;"><thead><tr style="background: #3498db; color: #fff;"><th style="padding: 8px; border: 1px solid #ddd; text-align: left;">Mese</th><th style="padding: 8px; border: 1px solid #ddd; text-align: right;">Importo</th></tr></thead><tbody>`;
            entAnno.forEach(x => { htmlContent += `<tr><td style="padding: 6px; border: 1px solid #ddd;">${x.m}</td><td style="padding: 6px; border: 1px solid #ddd; text-align: right; font-weight: bold;">€ ${x.v.toLocaleString('it-IT')}</td></tr>`; });
            htmlContent += `</tbody></table>`;
        });
        htmlContent += `</div>`;
        html2pdf().set({ margin: 10, filename: 'Archivio_Stipendi.pdf', html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4' } }).from(htmlContent).save();
    }

    function addV() { const v=parseFloat(document.getElementById('sv').value)||0, n=document.getElementById('sn').value, m=document.getElementById('sv-m').value, a=document.getElementById('sv-a').value; if(v>0) { db.v.push({v, n, m, a, id:Date.now()}); up(); renderV(); } }
    
    function renderV() {
        const yr = parseInt(document.getElementById('sv-a').value), selM = document.getElementById('sv-m').value, mtIdx = mesiArr.indexOf(selM);
        let tot = 0; let htmlV = db.v.filter(x=>x.a==yr && x.m==selM).map(x=>{ tot += x.v; return `<div class="card row-item"><span>${x.n}: <b>€${x.v.toFixed(2)}</b></span><button class="del-btn" onclick="delItem('v', ${x.id})">🗑️</button></div>`; }).join('');
        let htmlF = ""; let countF = 0; let idsF = []; 
        db.f.forEach(f => { 
            const s=new Date(f.da+"T00:00:00"), e=new Date(f.a+"T23:59:59"), c=new Date(yr, mtIdx, 2); 
            if(c>=s && c<=e) { 
                tot+=f.v; countF++; idsF.push(f.id); 
                htmlF+=`<div class="card row-item" style="border-left-color: var(--accent);"><div><span>📌 ${f.n}: <b>€${f.v.toFixed(2)}</b></span><span class="label-fissa">Durata: ${f.da} al ${f.a}</span></div><button class="del-btn" onclick="delItem('f', ${f.id})">🗑️</button></div>`; 
            }
        });
        document.getElementById('list-v').innerHTML = htmlV; 
        document.getElementById('list-f').innerHTML = countF > 0 ? `<button class="btn btn-red" style="padding:10px; font-size:12px; margin-bottom:10px; width:100%;" onclick="delMultipleF([${idsF}])">🗑️ SVUOTA FISSE DEL MESE</button>` + htmlF : htmlF;
        document.getElementById('fixed-header').style.display = countF>0?'flex':'none'; document.getElementById('tot-uscita').innerText = "Totale Mese: € "+tot.toFixed(2);
    }
    function delMultipleF(ids) { if(confirm("Eliminare fisse del mese?")) { db.f = db.f.filter(f => !ids.includes(f.id)); up(); renderV(); }}
    function toggleFixed() { const e=document.getElementById('list-f'); e.style.display=e.style.display==='block'?'none':'block'; }

    function renderB() {
        const yr = document.getElementById('b-a').value, selM = document.getElementById('b-m').value, mtIdx = mesiArr.indexOf(selM);
        const entM = db.s.filter(x => x.m === selM && x.a === yr).reduce((a,b) => a+b.v, 0);
        let uscM_V = db.v.filter(x => x.m === selM && x.a === yr).reduce((a,b) => a+b.v, 0);
        let uscM_F = 0; db.f.forEach(f => { const s=new Date(f.da+"T00:00:00"), e=new Date(f.a+"T23:59:59"), c=new Date(yr, mtIdx, 2); if(c>=s && c<=e) uscM_F += f.v; });
        const totUM = uscM_V + uscM_F;
        document.getElementById('b-res').innerHTML = `<div class="card" style="border-left-color: var(--green);"><b>BILANCIO ${selM.toUpperCase()} ${yr}</b><br><br>Entrate: €${entM.toLocaleString('it-IT')}<br>Uscite: €${totUM.toLocaleString('it-IT')}<hr>RESIDUO: <b>€${(entM-totUM).toLocaleString('it-IT')}</b></div>`;

        const entY = db.s.filter(x=>x.a===yr).reduce((a,b)=>a+b.v,0);
        let uscV = db.v.filter(x=>x.a===yr).reduce((a,b)=>a+b.v,0), uscF = 0;
        for(let i=0; i<12; i++) { db.f.forEach(f => { const s=new Date(f.da+"T00:00:00"), e=new Date(f.a+"T23:59:59"), c=new Date(yr, i, 2); if(c>=s && c<=e) uscF+=f.v; }); }
        const totU = uscV+uscF;
        document.getElementById('b-res-anno').innerHTML = `<div class="card"><b>RIEPILOGO ANNUALE ${yr}</b><br><br>Entrate Totali: €${entY.toLocaleString()}<br>Uscite Totali: €${totU.toLocaleString()}<hr>RISPARMIO: €${(entY-totU).toLocaleString()}</div>`;
        
        const ctxP = document.getElementById('pieChart').getContext('2d'); if(window.pChart) window.pChart.destroy();
        window.pChart = new Chart(ctxP, { type: 'pie', data: { labels: ['Uscite', 'Risparmio'], datasets: [{ data: [totU, Math.max(0, entY-totU)], backgroundColor: ['#e74c3c', '#2ecc71'] }] }, options: { maintainAspectRatio: false, plugins: { datalabels: { color: '#fff', font: { weight: 'bold', size: 14 }, formatter: (v, ctx) => { let s=0; ctx.chart.data.datasets[0].data.map(d=>s+=d); return s>0? (v*100/s).toFixed(1)+"%" : "0%"; } } } } });
    }

    function toggleBilancioAnno() {
        const area = document.getElementById('b-anno-area');
        const btn = document.getElementById('btn-toggle-anno');
        if(area.style.display === 'none') { area.style.display = 'block'; btn.innerText = "HIDE TOTALI ANNO"; }
        else { area.style.display = 'none'; btn.innerText = "📊 MOSTRA TOTALE ANNUALE"; }
    }

    function initChart() {
        const ctx = document.getElementById('myChart').getContext('2d'), yr = document.getElementById('chart-a').value;
        if(window.chartObj) window.chartObj.destroy();
        const labelsMesi = mesiArr.slice(0,12);
        let dEnt = [], dUsc = [], finalLabels = [];

        labelsMesi.forEach((m, i) => {
            const e = db.s.find(x => x.m === m && x.a === yr);
            let uV = db.v.filter(v => v.m === m && v.a === yr).reduce((a, b) => a + b.v, 0), uF = 0;
            db.f.forEach(f => { 
                const s = new Date(f.da + "T00:00:00"), eDate = new Date(f.a + "T23:59:59"), c = new Date(yr, i, 2); 
                if(c >= s && c <= eDate) uF += f.v; 
            });

            const valEnt = e ? e.v : 0;
            const valUsc = uV + uF;

            // Mostriamo il mese nel grafico SOLO se c'è almeno un'entrata o un'uscita registrata
            if (valEnt > 0 || valUsc > 0) {
                dEnt.push(valEnt);
                dUsc.push(valUsc);
                finalLabels.push(m);
            }
        });

        if (finalLabels.length === 0) return;

        window.chartObj = new Chart(ctx, { 
            type: 'line', 
            data: { 
                labels: finalLabels, 
                datasets: [
                    { label: 'Entrate', data: dEnt, borderColor: '#2ecc71', backgroundColor: '#2ecc71', tension: 0.3, pointRadius: 5 }, 
                    { label: 'Uscite', data: dUsc, borderColor: '#e74c3c', backgroundColor: '#e74c3c', tension: 0.3, pointRadius: 5 }
                ] 
            }, 
            options: { 
                maintainAspectRatio: false, 
                plugins: { 
                    legend: { labels: { color: '#fff' } }, 
                    datalabels: { align: 'top', color: '#fff', font: { size: 10, weight: 'bold' }, formatter: (v) => v > 0 ? '€' + v.toFixed(0) : '' } 
                }, 
                scales: { 
                    y: { ticks: { color: '#fff' }, grid: { color: '#34495e' } }, 
                    x: { ticks: { color: '#fff' }, grid: { color: '#34495e' } } 
                } 
            } 
        });
    }

    function addF() { const n=document.getElementById('f-n').value, v=parseFloat(document.getElementById('f-v').value)||0, da=document.getElementById('f-da').value, a=document.getElementById('f-a').value; if(n && v>0 && da && a) { db.f.push({n, v, da, a, id:Date.now()}); up(); alert("Salvata!"); } }
    function delItem(t, id) { if(confirm("Eliminare?")) { db[t] = db[t].filter(x=>x.id!==id); up(); renderS(); renderV(); renderB(); }}
    function exportD() { document.getElementById('back').value = JSON.stringify(db); alert("Backup generato!"); }
    function importD() { try { db = JSON.parse(document.getElementById('back').value); up(); location.reload(); } catch(e) { alert("Errore!"); }}

    if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js').then(reg => console.log('SW OK')).catch(err => console.log('SW KO')); }); }
</script>
</body>
</html>
